name: Build Android NDK r27b (Termux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y xz-utils unzip tar wget

      - name: Download NDK r27b
        run: |
          wget -O ndk.zip https://github.com/zryyoung/openjdk-Termux/releases/download/android-ndk/android-ndk-r27b-aarch64.zip
          unzip ndk.zip -d work

      - name: Compress NDK (no symlink modifications)
        run: |
          cd work
          NDK_DIR=$(find . -mindepth 1 -maxdepth 1 -type d | head -n 1)
          echo "Using NDK directory: $NDK_DIR"

          TAR_NAME=android-ndk-r27b-aarch64-linux-android.tar.xz

          # ⭐ 直接压缩，不进入目录，不修改任何文件
          tar -C "$NDK_DIR" -cf "$TAR_NAME" -I "xz -9 -T2" .

          echo "Compressed file: work/$TAR_NAME"

      - name: Upload Release via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd work

          TAG="android-ndk-r27b"
          NAME="android-ndk-r27b"
          FILE="android-ndk-r27b-aarch64-linux-android.tar.xz"

          # 如果 Release 不存在则创建
          gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 \
            || gh release create "$TAG" "$FILE" \
                 --repo "${{ github.repository }}" \
                 --title "$NAME" \
                 --notes "Android NDK r27b (Termux build)"

          # 如果 Release 已存在，则覆盖上传
          gh release upload "$TAG" "$FILE" \
            --repo "${{ github.repository }}" \
            --clobber
