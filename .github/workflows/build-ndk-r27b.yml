name: Build Android NDK r27b (Termux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y xz-utils unzip tar wget

      - name: Download NDK r27b
        run: |
          wget -O ndk.zip https://github.com/zryyoung/openjdk-Termux/releases/download/android-ndk/android-ndk-r27b-aarch64.zip
          unzip ndk.zip -d work

      - name: Process NDK directories
        run: |
          cd work
          # 找到解压目录
          NDK_DIR=$(find . -mindepth 1 -maxdepth 1 -type d | head -n 1)
          echo "Using NDK directory: $NDK_DIR"
          cd "$NDK_DIR"

          # prebuilt 下创建软链接
          if [ -d prebuilt ]; then
            cd prebuilt
            for d in *; do
              if [ "$d" != "linux-x86_64" ]; then
                ln -sf "$d" linux-x86_64 || true
                break
              fi
            done
            cd ..
          fi

          # toolchains/llvm/prebuilt 下创建软链接
          if [ -d toolchains/llvm/prebuilt ]; then
            cd toolchains/llvm/prebuilt
            for d in *; do
              if [ "$d" != "linux-x86_64" ]; then
                ln -sf "$d" linux-x86_64 || true
                break
              fi
            done
            cd ../../../
          fi

          # 压缩文件
          TAR_NAME=android-ndk-r27b-aarch64-linux-android.tar.xz
          tar -cf "$TAR_NAME" -I "xz -9 -T2" "$NDK_DIR"
          echo "Compressed file: work/$TAR_NAME"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-ndk-r27b       # Release tag
          name: android-ndk-r27b           # Release name
          files: work/android-ndk-r27b-aarch64-linux-android.tar.xz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
